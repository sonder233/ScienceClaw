servers:
  - id: pubmed
    name: PubMed MCP
    description: PubMed search access
    transport: streamable_http
    enabled: true
    default_enabled: true
    url: http://mcp-pubmed:8080/mcp
    # Optional HTTP headers for streamable_http/sse transports.
    # `http_headers` and `http_header` are accepted aliases and are normalized
    # to `headers` by the backend.
    # headers:
    #   Authorization: "Bearer {{ api_key }}"
  - id: rpa_gateway
    name: RPA Tool Gateway
    description: Unified entry for RPA MCP tools published from Tools
    transport: streamable_http
    enabled: true
    default_enabled: false
    url: http://localhost:12001/api/v1/rpa-mcp/mcp

