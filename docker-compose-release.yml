services:
  sandbox:
    image: swr.cn-north-4.myhuaweicloud.com/claw/rpaclaw-sandbox:release-v0.0.4
    security_opt:
    - seccomp:unconfined
    extra_hosts:
    - host.docker.internal:host-gateway
    shm_size: 2gb
    mem_limit: ${SANDBOX_MEM_LIMIT:-8g}
    cpus: ${SANDBOX_CPUS:-4}
    environment:
      TZ: Asia/Shanghai
    volumes:
    - ./Skills:/skills:ro
    - ./Tools:/app/Tools:ro
    - ./RpaClaw/backend/builtin_skills:/builtin-skills:ro
    - ./workspace:/home/rpaclaw:rwx
    ports:
    - 18080:8080
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8080/v1/docs >/dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 30
  mongo:
    image: swr.cn-north-4.myhuaweicloud.com/claw/rpaclaw-mongo:release-v0.0.4
    environment:
      MONGO_INITDB_ROOT_USERNAME: scienceone
      MONGO_INITDB_ROOT_PASSWORD: Yp51Bi1eEjC77sAt
    ports:
    - 27014:27017
    volumes:
    - rpaclaw_mongo_data:/data/db
    restart: unless-stopped
  backend:
    image: swr.cn-north-4.myhuaweicloud.com/claw/rpaclaw-backend:release-v0.0.4
    volumes:
    - ./Tools:/app/Tools
    - ./workspace:/home/rpaclaw
    environment:
      SANDBOX_REST_URL: http://sandbox:8080
      WORKSPACE_DIR: /home/rpaclaw
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${API_BASE-https://api.deepseek.com/v1}
      DS_MODEL: ${MODEL_NAME-deepseek-chat}
      TEMPERATURE: ${TEMPERATURE-0.7}
      MAX_TOKENS: ${MAX_TOKENS-2000}
      LOG_LEVEL: ${LOG_LEVEL-INFO}
      FILE_DOWNLOAD_ALLOWED_PREFIXES: /tmp,/app,/home/rpaclaw
      TZ: Asia/Shanghai
      AUTH_PROVIDER: local
      BOOTSTRAP_ADMIN_ENABLED: 'true'
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: admin123
      BOOTSTRAP_ADMIN_FULLNAME: Administrator
      BOOTSTRAP_ADMIN_EMAIL: admin@localhost
      BOOTSTRAP_UPDATE_ADMIN_PASSWORD: 'true'
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      TASK_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
    ports:
    - 12001:8000
    command: 'python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app/backend

      '
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_started
      mongo:
        condition: service_started
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8000/api/v1/auth/status >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
  scheduler_api:
    image: swr.cn-north-4.myhuaweicloud.com/claw/rpaclaw-task-service:release-v0.0.4
    environment:
      TZ: Asia/Shanghai
      DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${API_BASE:-https://api.deepseek.com/v1}
      DS_MODEL: ${MODEL_NAME:-deepseek-chat}
    ports:
    - 12002:8001
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      backend:
        condition: service_started
  frontend:
    image: swr.cn-north-4.myhuaweicloud.com/claw/rpaclaw-frontend:release-v0.0.4
    environment:
      BACKEND_URL: http://backend:8000
      TASK_SERVICE_URL: http://scheduler_api:8001
      VITE_DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      NPM_CONFIG_CACHE: /npm-cache
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '300'
      TZ: Asia/Shanghai
    ports:
    - 5173:80
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      scheduler_api:
        condition: service_started
volumes:
  rpaclaw_mongo_data: null
  rpaclaw_frontend_node_modules: null
  rpaclaw_frontend_npm_cache: null
